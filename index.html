<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0"/>

  <title>Interactive Joy Infographic</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>Joy Interactive Infographic</h1>

  <div class="image-wrapper">

    <img src="joy-infographic.png"
         alt="Joy infographic"
         class="infographic">

<!-- CORE CHARACTERISTICS -->
<button class="hotspot core"
  onclick="openPanel(
  'CORE CHARACTERISTICS',
  '• Uplifting, warm, and energizing\n\n• Expands awareness and perspective\n\n• Creates connection and belonging\n\n• Increases openness and creativity\n\n• Promotes well-being and resilience\n\n• Contagious and inspirational\n\n• Often accompanied by gratitude, playfulness, and contentment',
  'core-characteristics.html'
  )"
  aria-label="Core Characteristics">
</button>

<!-- ORIENTATION -->
<button class="hotspot orientation"
  onclick="openPanel(
  'ORIENTATION',
  '• Future-oriented joy often feels hopeful, excited, or inspired by possibility\n\n• Past-oriented joy may appear as gratitude, nostalgia, or appreciation for meaningful experiences\n\n• Present-oriented joy is grounded in enjoyment, connection, and meaning within the current moment',
  'orientation.html'
  )"
  aria-label="Orientation">
</button>

<!-- TYPICAL CONTEXTS -->
<button class="hotspot typical"
  onclick="openPanel(
  'TYPICAL CONTEXTS',
  '• Shared celebration and connection\n\n• Accomplishment and meaningful progress\n\n• Play, humor, creativity, and discovery\n\n• Gratitude, appreciation, and belonging\n\n• Moments of relief, beauty, or wonder',
  'typical-contexts.html'
  )"
  aria-label="Typical Contexts">
</button>

<!-- MODE OF OPERATION -->
<button class="hotspot mode"
  onclick="openPanel(
  'MODE OF OPERATION',
  '• Broadens attention and perspective\n\n• Opens the mind toward possibility\n\n• Increases flexibility and creativity\n\n• Encourages connection, exploration, and engagement\n\n• Builds energy for growth and resilience',
  'mode-of-operation.html'
  )"
  aria-label="Mode of Operation">
</button>

<!-- SKILL BUILDING -->
<button class="hotspot skill"
  onclick="openPanel(
  'SKILL BUILDING & MANAGEMENT SYSTEMS',
  '• Notice joy without rushing past it\n\n• Protect conditions that allow joy to grow\n\n• Practice gratitude, playfulness, and presence\n\n• Share joy in ways that create connection\n\n• Use joy as information about values, meaning, and belonging',
  'skill-building.html'
  )"
  aria-label="Skill Building and Management Systems">
</button>

<!-- EMOTIONAL BANDWIDTH -->
<button class="hotspot bandwidth"
  onclick="openPanel(
  'EMOTIONAL BANDWIDTH',
  '• Joy can be subtle, steady, bright, or deeply moving\n\n• It can appear as quiet contentment or full celebration\n\n• Joy expands emotional space instead of narrowing it\n\n• It may coexist with sadness, grief, stress, or uncertainty',
  ''
  )"
  aria-label="Emotional Bandwidth">
</button>

<!-- LEVELS OF INTENSITY -->
<button class="hotspot intensity"
  onclick="openPanel(
  'LEVELS OF INTENSITY',
  '• Low intensity joy may feel like calm appreciation or peaceful contentment\n\n• Moderate joy may feel warm, playful, connected, or energized\n\n• High intensity joy may feel exciting, celebratory, radiant, or deeply moving\n\n• Intensity can rise and fall without making joy less real',
  ''
  )"
  aria-label="Levels of Intensity">
</button>

<!-- IN STRESSED SITUATIONS -->
<button class="hotspot stressed"
  onclick="openPanel(
  'IN STRESSED SITUATIONS',
  '• Stress often narrows attention and makes joy harder to notice\n\n• Joy may become quiet, brief, or hidden under pressure\n\n• Small moments of joy can help restore emotional balance\n\n• Reconnection, rest, meaning, and support can make joy accessible again',
  ''
  )"
  aria-label="In Stressed Situations">
</button>

<!-- GROUND JOY -->
<button class="hotspot ground"
  onclick="openPanel(
  'GROUND JOY INTO THE PRESENT',
  '• Pause long enough to notice what is good, meaningful, or connecting\n\n• Let the body experience joy instead of rushing past it\n\n• Use breath, attention, gratitude, or connection to stay present\n\n• Grounding joy helps it become more real and memorable',
  ''
  )"
  aria-label="Ground Joy Into the Present">
</button>

<!-- RELATIONSHIPS -->
<button class="hotspot relationships"
  onclick="openPanel(
  'RELATIONSHIPS BETWEEN JOY AND OTHER EMOTIONS',
  '• Some emotions support joy, such as love, gratitude, calm, trust, excitement, and compassion\n\n• Some emotions mix with joy, such as surprise, nostalgia, sadness, awe, and relief after fear\n\n• Some emotions can block or distort joy, such as anger, anxiety, guilt, shame, envy, and disgust\n\n• Joy often becomes clearer when students understand how emotions interact',
  ''
  )"
  aria-label="Relationships Between Joy and Other Emotions">
</button>

<!-- QUOTE -->
<button class="hotspot quote"
  onclick="openPanel(
  'JOY QUOTE',
  'To get the full value of joy you must have someone to divide it with.\n\n— Mark Twain',
  ''
  )"
  aria-label="Joy Quote">
</button>

<!-- POWER DYNAMICS -->
<button class="hotspot power"
  onclick="openPanel(
  'POWER DYNAMICS BETWEEN JOY, THOUGHTS, AND BEHAVIORS',
  '• Awareness helps students recognize where joy is present or missing\n\n• Thoughts can either open space for joy or block it through comparison, fear, or pressure\n\n• Behaviors create conditions where joy can grow through connection, meaning, presence, and action\n\n• Joy can influence choices, motivation, relationships, and resilience',
  ''
  )"
  aria-label="Power Dynamics">
</button>

<!-- POWER LEVELS -->
<button class="hotspot powerlevels"
  onclick="openPanel(
  'POWER LEVELS',
  '• Joy has immediate power by shifting mood, energy, and perspective\n\n• Thoughts have shaping power because they influence how experiences are interpreted\n\n• Behaviors have expressive power because they create and sustain joyful experiences',
  ''
  )"
  aria-label="Power Levels">
</button>

<!-- ESSENCE OF JOY -->
<button class="hotspot essence"
  onclick="openPanel(
  'THE ESSENCE OF JOY',
  '• Joy is not just a feeling. It is a way of living\n\n• Protect it like a priority\n\n• Cultivate it daily\n\n• Share it generously\n\n• Let it guide your life',
  ''
  )"
  aria-label="The Essence of Joy">
</button>

  <!-- PANEL -->

  <div id="panel"
       class="panel hidden">

    <h2 id="panelTitle"></h2>

    <p id="panelText"></p>

    <button onclick="speakText()">
      🔊 Listen
    </button>

    <button id="learnMoreBtn">
      Explore More →
    </button>

    <button onclick="closePanel()">
      Close
    </button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
